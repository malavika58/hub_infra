# ═══════════════════════════════════════════════════════════════════
# Mosquitto MQTT Broker — CixioHub
# Version: Eclipse Mosquitto 2.x
#
# Ports:
#   1883  — plain MQTT (TCP)
#   9883  — MQTT over WebSocket (for browser / Flutter web)
#
# Production: mqtt://mqtt.hub.cixio.dev:1883
#             wss://mqtt.hub.cixio.dev:9883
#
# Topics used by CixioHub:
#   cixiohub/notifications/{user_id}   — push notifications
#   cixiohub/chat/{session_id}         — real-time chat events
#   cixiohub/presence/{user_id}        — online/offline status
#   cixiohub/system/broadcast          — system-wide announcements
# ═══════════════════════════════════════════════════════════════════

# ── Plain MQTT listener (TCP) ────────────────────────────────────────
listener 1883
protocol mqtt

# ── MQTT over WebSocket ───────────────────────────────────────────────
# Flutter web and browsers connect via WebSocket
listener 9883
protocol websockets

# ── Security ──────────────────────────────────────────────────────────
# TODO: set allow_anonymous false and configure password_file for production
allow_anonymous true
# password_file /mosquitto/config/passwd

# ── Persistence ───────────────────────────────────────────────────────
# Retain messages across broker restarts
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────────────
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# ── Connection limits ─────────────────────────────────────────────────
max_connections 1000
max_keepalive 60
